<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的知識庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --border: #e8e6e0;
    --text: #1a1a18;
    --muted: #888880;
    --accent: #2d6a4f;
    --accent-light: #e8f5ee;
    --tag-colors: #f0ede8;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'Noto Serif TC', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.7;
  }

  /* Layout */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .sidebar-header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  .sidebar-section {
    padding: 20px 16px 8px;
  }

  .sidebar-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px;
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 9px 12px;
    border: none;
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: background 0.15s;
  }

  .cat-btn:hover { background: var(--bg); }
  .cat-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }

  .cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .add-btn {
    margin: 16px;
    padding: 11px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.03em;
  }

  .add-btn:hover { opacity: 0.88; }

  /* Main */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .search-wrap {
    flex: 1;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 10px 16px 10px 38px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .search-wrap input:focus { border-color: var(--accent); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
  }

  .view-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  /* Cards Grid */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.15s;
    position: relative;
  }

  .card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-2px);
  }

  .card-cat {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 8px;
    color: var(--text);
  }

  .card-preview {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-date {
    margin-top: 14px;
    font-size: 11px;
    color: #b8b5af;
    font-family: 'DM Mono', monospace;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; }

  /* Modal */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 16px;
    width: 100%;
    max-width: 620px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px;
    transform: translateY(16px);
    transition: transform 0.2s;
    box-shadow: 0 24px 64px rgba(0,0,0,0.12);
  }

  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .modal-header h2 { font-size: 18px; font-weight: 600; }

  .close-btn {
    width: 32px; height: 32px;
    border: none; background: var(--bg);
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
  }

  .close-btn:hover { background: var(--border); }

  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--bg);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--accent);
  }

  .form-group textarea { min-height: 140px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .btn-cancel {
    padding: 9px 20px;
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: var(--muted);
  }

  .btn-save {
    padding: 9px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
  }

  /* Detail view */
  .detail-content {
    white-space: pre-wrap;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    margin-top: 12px;
  }

  .detail-meta {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
  }

  .btn-edit {
    padding: 9px 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: var(--text);
  }

  .btn-delete {
    padding: 9px 20px;
    background: #fff0f0;
    border: 1px solid #ffd6d6;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: #c0392b;
  }

  @media (max-width: 640px) {
    .sidebar { width: 220px; min-width: 220px; }
    .content { padding: 20px 16px; }
    .topbar { padding: 16px; }
    .modal { padding: 20px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->

    <div class="sidebar-header">

      <button class="cat-btn" data-cat="留下來的人" onclick="filterCat('留下來的人')">

      <button class="cat-btn" data-cat="理財" onclick="filterCat('理財')">

      </button>
      <button class="cat-btn" data-cat="親子教養" onclick="filterCat('親子教養')">

        <span class="cat-count" id="count-親子教養">0</span>
      </button>
      <button class="cat-btn" data-cat="其他" onclick="filterCat('其他')">
        <span class="cat-dot" style="background:#bbb"></span>
        其他
        <span class="cat-count" id="count-其他">0</span>
      </button>
    </div>

    <div style="flex:1"></div>
    <button class="add-btn" onclick="openAdd()">＋ 新增筆記</button>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <span class="view-title" id="view-title">全部</span>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="搜尋筆記..." oninput="search(this.value)">
      </div>
    </div>

    <div class="content">
      <div class="cards-grid" id="cards"></div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modal-title">新增筆記</h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const CAT_COLORS = {
  '中醫氣功': '#7cb9a0',
  '醫療知識': '#6fa8dc',
  '個人成長': '#e6a84a',
  'AI工具': '#9b87d4',
  '靈感記錄': '#e88080',
  '結構學習': '#d4845a',
  '留下來的人': '#c084a0',
  '理財': '#4a9eda',
  '親子教養': '#f0a050',
  '其他': '#bbb',
};

let notes = JSON.parse(localStorage.getItem('kb_notes') || '[]');
let currentCat = 'all';
let searchQ = '';
let editingId = null;

// Pre-load from Notion content
if (notes.length === 0) {
  notes = [
    { id: uid(), title: '氣感', cat: '中醫氣功', content: '從 Notion 匯入。關於氣感的探討與體驗紀錄。', date: '2025-08-15' },
    { id: uid(), title: '討論氣脈', cat: '中醫氣功', content: '從 Notion 匯入。氣脈相關討論整理。', date: '2025-08-10' },
    { id: uid(), title: '內斂情志對氣機的影響', cat: '中醫氣功', content: '從 Notion 匯入。情志內斂如何影響氣機運行的分析。', date: '2025-08-08' },
    { id: uid(), title: '🗓 練功紀錄｜2025-08-15', cat: '中醫氣功', content: '從 Notion 匯入。今日練功紀錄與心得。', date: '2025-08-15' },
    { id: uid(), title: '王醫師講義整理：打坐練功心法', cat: '中醫氣功', content: '從 Notion 匯入。打坐練功心法整理，來自王醫師講義。', date: '2025-08-20' },
    { id: uid(), title: '紅棗深入探討', cat: '醫療知識', content: '從 Notion 匯入。紅棗的醫學研究與功效探討。', date: '2025-07-20' },
    { id: uid(), title: '耳朵塞住（NEJM）', cat: '醫療知識', content: '從 Notion 匯入。參考 NEJM 相關文獻關於耳朵阻塞的處理。', date: '2025-07-15' },
    { id: uid(), title: '馬來西亞醫療法', cat: '醫療知識', content: '從 Notion 匯入。馬來西亞醫療相關法規整理。', date: '2025-08-05' },
    { id: uid(), title: '🌿 一場覺醒：我為什麼決定辭去理事長', cat: '個人成長', content: '從 Notion 匯入。辭去理事長職位的心路歷程與覺察。', date: '2025-08-18' },
    { id: uid(), title: '🌿 邊界感覺察與共生關係筆記', cat: '個人成長', content: '從 Notion 匯入。關於邊界感與共生關係的深度覺察。', date: '2025-08-22' },
    { id: uid(), title: '🧠 今日觀察與感悟：關於漸凍人（ALS）阿姨', cat: '個人成長', content: '從 Notion 匯入。觀察 ALS 病患的感悟與反思。', date: '2025-08-15' },
    { id: uid(), title: '《當他說「你滾！」我告訴自己：這不是失敗，是長大的痛》', cat: '個人成長', content: '從 Notion 匯入。面對衝突與成長的心理歷程記錄。', date: '2025-08-01' },
    { id: uid(), title: 'AI 的使用方法（萬sir）', cat: 'AI工具', content: '從 Notion 匯入。萬 sir 分享的 AI 工具使用方法整理。', date: '2025-08-12' },
    { id: uid(), title: '🎨 Canva + GPT-5 整合功能完全導覽（2025版）', cat: 'AI工具', content: '從 Notion 匯入。Canva 與 GPT-5 整合功能的完整導覽筆記。', date: '2025-08-25' },
    { id: uid(), title: '使用 Notion AI 測試（語音）', cat: 'AI工具', content: '從 Notion 匯入。Notion AI 語音功能的測試紀錄。', date: '2025-08-10' },
    { id: uid(), title: '🖐 如何判斷「順張力」方向？', cat: '結構學習', date: '2025-04-26', content: `【核心原理：找「最少阻力路徑」】
林兩傳的順勢操作，就是「順著身體自然釋放的方向」去走。
皮膚張力走向有主軸，就像打結的線團，會有一個方向最鬆、最滑、最願意走。

───────────────────────
【三步判斷法】

Step 1：捏起皮膚，微幅試探
用指腹或掌根輕輕提起一小片皮膚（約2-3公分範圍），往不同方向輕推（1-2公分即可）。
• 卡卡的、拉住不放 → 逆張力
• 滑順、像自動帶著走 → 順張力

Step 2：確認主方向
找到最輕鬆、最容易滑動的方向，這就是「順勢」。
順張力 ≠ 完全沒阻力，而是「阻力最小」的那個方向。

Step 3：沿著張力線延伸操作
沿線滑動，像解開拉鍊，每推一段再次試探，因為張力方向會隨著鬆解而改變。

───────────────────────
【例子：肩胛骨內側操作】
捏起皮膚試探：
• 往上推 → 卡住
• 往下推 → 有點阻力
• 往外推 → 突然很順，皮膚像被帶動 ✅
→ 沿著「往外推」方向操作，即為順張力。

───────────────────────
【進階判斷技巧】
• 浮動感：順勢時皮膚下方會有「浮起來」的感覺，筋膜在釋放
• 搭配呼吸：患者會自然深呼吸，是張力打開的訊號

───────────────────────
【常見錯誤】
❌ 太急、力量過大：感覺不到張力細微變化
❌ 只試兩個方向：需試探至少3-4個方向
❌ 忽略動態變化：鬆解中張力方向會改變，要邊走邊調整

───────────────────────
【一句話總結】
「順張力」＝ 找到皮膚最願意被帶動的方向，像牽著小孩走路，不是拖著走，而是引導他自己前進。

【練習建議】
在自己手臂、肩膀上練習，感覺皮膚哪個方向最滑。
或找家人練手感，熟悉不同體型、不同部位的張力走向。` },
    { id: uid(), title: '📓 學習週記｜2025/4/20～4/26（林兩傳）', cat: '結構學習', date: '2025-04-26', content: `【一、整復手法 SOP】
深入討論整復 SOP 流程，從小腿肚撥筋到肩胛骨調整，展現成熟的操作邏輯。
探索「解皮」與筋膜鬆動的細節，手法核心在於皮筋連結處的釋放與結構調整。

    { id: uid(), title: '🧠 CODE＋PARA 第二大腦實戰操作法', cat: 'AI工具', date: '2025-08-28', content: `【核心概念】
CODE＋PARA 是一套讓知識真正融入生活的「第二大腦」方法論。

───────────────────────

D 提煉 Distill   → 每週一次（例：週日）挑關鍵 1–3 條，寫成標題式摘要
E 表達 Express   → 每月或完成里程碑後，輸出為文章、簡報、教案、IG

───────────────────────
【PARA 四大資料夾說明】
📁 Projects（短期任務）

    { id: uid(), title: '💰 綠教的文｜花錢的哲學', cat: '理財', date: '2026-03-01', content: `【核心觀念】
錢的目的是讓你過自己想要過的生活，不是讓錢本身變成目標。
應該是你管錢，不是錢管你。

【Kawhi Leonard的例子】
NBA球星簽下1億美金合約卻開20年舊車——這不是節儉，是高風險。
現代車有車道偏移警告、自動煞停等安全裝置，舊車沒有。
有財富基礎、家裡有子女依靠自己的人，安全方面不該妥協。

【關鍵觀念：過可以負擔的生活，不是過盡量不花錢的生活】
節儉的富豪之所以有錢，主因是龐大收入，不是節儉。
學他們節儉，不會讓你變得跟他們一樣有錢。

【不要買的三種東西】
1. 付不起
2. 不會用（沒有實用價值）
3. 不快樂——帶來的痛苦大於快樂

【結論】
不要花錢讓自己不舒服。
但也不要以為都不花錢，就是最好的財務規劃。
財務上能負擔，也不代表就要去做——重點是你想要，而且能對人生經驗加分。` },
    { id: uid(), title: '🤖 Claude Cowork 完整設定指南（Ruben Hassid）', cat: 'AI工具', date: '2026-03-01', content: `【Claude 產品線快速整理】
• Claude Chat：像 ChatGPT，基本對話
• Claude Project：Chat 切成獨立專案空間
• Claude Code：開發者用，寫程式革命
• Claude Cowork：像 Code，但為知識工作者設計
• Claude Skills：可重複工作流程，比 Projects 進化
• Claude Connectors：接進 Slack、Google Calendar、Gmail 等工具
• Claude Plugins：需自己設定，或從 App Store 下載

───────────────────────
【核心觀念：忘掉「寫 Prompt」這件事】
Cowork 的遊戲規則是文字檔案（.md）。
把你知道的一切——寫作風格、公司規則、最佳範例——寫成文字檔放進資料夾，讓 Claude 指向那個資料夾。
你給的背景檔案愈充分，需要的 Prompt 就愈少。

───────────────────────
【資料夾結構】
母資料夾：CLAUDE COWORK
├── ABOUT ME（about-me.md + anti-ai-writing-style.md）
├── PROJECTS（進行中的工作，每個專案一個子資料夾）
├── TEMPLATES（值得重複使用的完成品架構）
└── CLAUDE OUTPUTS（Claude 交付成果的地方）

唯讀：ABOUT ME、TEMPLATES、PROJECTS
寫入：只有 CLAUDE OUTPUTS

───────────────────────
【全域指令 Global Instructions 設定】
位置：設定 → Cowork → 編輯全域指令
重點規則：
• 每個任務開始前先讀 ABOUT ME 兩個檔案
• 任務相關專案先讀 PROJECTS 對應子資料夾
• 涉及內容類型先研究 TEMPLATES 結構
• 所有輸出命名格式：專案名_內容類型_v1.副檔名
• 簡報不清楚時使用 AskUserQuestion，不用通用填充內容
• 不要過度解釋，直接交付成果

───────────────────────
【AskUserQuestion 工具】
這是 Cowork 內建工具，讓 AI 來 Prompt 你。
使用方式：在 Prompt 加上「先用 AskUserQuestion 工具蒐集足夠的背景資訊」
效果：Claude 生成互動表單，有按鈕、可點擊選項、多選、可拖曳排序。

───────────────────────
【萬用 Prompt 模板（80% 情況適用）】
「我想要 [任務] 來達成 [成功標準]。
先瀏覽我的 CLAUDE COWORK 資料夾，然後用 AskUserQuestion 工具問我問題。
我想在你執行之前先和你一起調整方向。」

Mac 小技巧：設定文字替換，輸入 /prompt 自動貼上此模板。

───────────────────────
【四個實際使用情境】
1. 寫電子報：放入過往電子報、風格指南、參考文件 → Claude 問問題 → 輸出
2. 諮詢交付物：客戶簡報放進資料夾 → Claude 讀簡報+模板 → 直接建立 .docx
3. 競爭分析：放入競爭對手文章 → 建立比較表找出差異
4. 自動化週報：用 /schedule Plugin，每週一自動搜尋、整理、存檔

───────────────────────
【Plugins 安裝】
路徑：Cowork → Customize → Browse plugins
輸入 / 查看可用斜線指令
推薦入門：Productivity、Marketing、Sales、Data、Legal

【Connectors】
路徑：設定 → Connectors
可連接：Slack、Google Drive、Notion、Figma 等 50+ 工具
費用：免費

───────────────────────
【Cowork 的缺點（誠實說）】

❌ 仍在 Research Preview 階段，會出錯，輸出要審查
❌ 需要桌面應用程式開著，無行動版/網頁版
❌ 不適合快問快答，只適合多步驟任務
❌ Agent 約 10% 機率不穩定，注意輸出一致性

───────────────────────
【第一個 30 分鐘快速上手】
0-5 分：安裝桌面應用程式，登入 Pro 帳號
5-10 分：建立資料夾結構，寫 about-me.md
10-15 分：第一次 Cowork 對話，用萬用 Prompt
15-20 分：安裝一個 Plugin，試用斜線指令
20-30 分：給一個真實任務，建立第一個交付物

永遠選 Opus 4.6 + Extended Thinking。` },

    { id: uid(), title: '👶 當孩子說「我不要了」——鼓勵vs勉強的關鍵', cat: '親子教養', date: '2026-03-01', content: `【核心觀念】
「我不要了」不是放棄的訊號，而是教養最重要的時刻。
關鍵不是立刻決定要推還是要尊重，而是先停下來，陪孩子看看心裡發生了什麼。

───────────────────────
【鼓勵 vs 勉強——三個判斷方式】

✅ 一、看孩子平常對這件事的態度
• 平常喜歡，只是因為一次挫折退縮 → 需要陪伴與鼓勵
• 長期抗拒，每次都充滿壓力 → 重新思考是否適合

✅ 二、看孩子當下的情緒
• 說不要，是因為害怕失敗？還是真的太累了？
• 願意停一下陪孩子說感受，他會慢慢釐清自己

✅ 三、把選擇與結果一起放在孩子面前
• 不急著說服，陪他看看不同選擇可能帶來的感受
• 孩子開始思考，就是在練習「為自己的選擇負責」

───────────────────────
【實際對話技巧】
當孩子說「我不要了」，先問：
• 「是覺得太難，還是覺得很累？」
• 「是今天不想，還是最近都不太想？」
• 「如果那種失落的感覺出現了，你覺得準備好面對了嗎？」

不是急著推他回去，也不是立刻放棄，而是把選擇放在他面前。

───────────────────────
【關於成功與價值】
孩子容易把自己的價值放在外在結果（名次、獎牌、掌聲）。
更重要的是讓孩子看見：那些成功的人，是因為過程中培養出的心理力量。

尤其高敏感氣質的孩子，太早把價值交給外界評價，容易在不同聲音裡迷失。

───────────────────────
【希望孩子記得的事】
• 騎車、游泳、跑步都能練習進步
• 但更重要的是：遇到不安、挫折、猶豫時，願意停下來看看自己的感受，再做一個選擇
• 在情緒裡繼續往前走的力量，才是陪伴一個人很久的底氣

───────────────────────
【真正的自信】
不是站在台上的那一刻。
而是在沒有掌聲的時候，仍然知道自己值得被肯定。

我們可以自己肯定自己。他的存在，本身就有價值。` },
    { id: uid(), title: '📖 傳說八｜胃氣與老（林兩傳）', cat: '結構學習', date: '2026-03-01', content: `【胃氣的比喻】
嫩枝條折彎不斷 = 有胃氣
乾枯枝條一折就斷 = 沒有胃氣
→ 真正難治療的是「老」，不是「病」

───────────────────────
【核心臨床觀念】

坐骨神經痛/頸椎壓迫能否治療的關鍵：
→ 椎體的相對可動性還有多少（不是椎間盤突出程度）
→ 只要某些時間或姿勢症狀可以完全消失，就一定可以治好
→ 神經根沒有被完全壓死，重塑結構即可

組織彈性決定治療難易度：
→ 年輕/有彈性組織：大體對位即可，組織自行代償
→ 蒼老/乾枯組織：每一層張力都要還原得非常精細

───────────────────────
【橫軸與縱軸的關係】
• 手指頭僵硬 → 橫軸鎖住縱軸 → 脊椎壓迫無法解開
• 必須先拆橫軸，再處理縱軸
• 橫軸拆解完畢指標：坐姿前推時，胸頸椎交接處可陷入前彎弧線
• 縱軸調整完畢指標：坐姿挺腰時，兩側腸薦關節及腰肌對稱活動

───────────────────────
【針刺機制的新理解】
舊認知：針刺 = 微觀組織張力的重新分布
新發現：針刺鬆解過程中，包含了微觀組織的「撕裂」成分

佐證：
• 只是張力重分布 → 皮膚肌肉間滑移應為等距牽引
• 實際感覺是「分離」而非「等距牽引」
• 肌肉間相對位置改變劇烈，超過單純張力重分布的程度

臨床應用：
→ 從遠端到近心端、從淺層到深層，依序拆解張力
→ 出針時皮膚仍黏著針身 = 遠端或深層張力尚未完全鬆解
→ 解疤痕組織的針法設計將因此調整

───────────────────────
【工具筆記】
✅ T型美容儀（網路可購）
• 觸點小，可精準控制震動部位和深度
• 適合結構治療使用

❌ 筋膜槍
• 震動力量太大，範圍太廣
• 好的有彈性組織被撕裂，纖維化組織反而只是團塊移動
• 不能達到精準分離效果，不建議使用

───────────────────────
【臨床結構評估重點】
縱軸旋轉方向 → 判斷凹凸面位置
橫軸旋轉方向 → 判斷手指/肋骨/骨盆鎖定程度
組織質地觸診 → 判斷預後與治療難度
肌肉彈性 → 有彈性=有胃氣=預後好` },
    { id: uid(), title: '🩺 鬼扯淡｜醫二代（林兩傳）', cat: '結構學習', date: '2026-03-01', content: `【故事一：公園裡迷路的小朋友】
林兩傳在公園散步，遇到一個邊跑邊哭、找不到阿姨的小朋友。

【故事二：醫二代的小時候】

他看到路邊人力三輪車，走過去問車伕：

【我的故事】

17歲離開家鄉，一個人在外地生活。因為某些機緣回到馬來西亞，在一間中醫診所應徵，遇到同樣從外地來、懷抱行醫夢的他。

結婚後有孩子，一切辛苦開始。我從來都不會是第一位。當全職媽媽，負責診所行政、藥商、銀行。那時還不會開車，抱著孩子進出銀行格外困難。

有時候帶孩子煮飯，中午和孩子一起不支睡著。他用責備的語氣說不應該讓孩子睡這麼久。

他生病後說：「還不就是因為你。因為你捨不得這裡！」但這裡也不是我家鄉。當初我說不如乘此機會離開，他說：「我才不要便宜他！」

兒子很小時發現健康問題，長期追蹤治療，後來慢慢好轉。等兒子稍大，我回診所上班。

我去上了一位老師的課，回來各式批評。我練功他不屑。我做某些練習，他說危險會危及生命。

頂著經濟壓力，不可以發脾氣，不可以抱怨。最好是一台無聲工具，照顧孩子，處理事務，不出trouble。

他生了重病。我動用人脈找好醫師，把孩子托給媽媽照顧，獨自飛去照顧他。開完刀睡在病床旁邊的沙發。出了狀況我幫他處理後送他去急診。我隔兩天就要回馬來西亞，他不要驚動家人，說可以自己處理。

結果正當我邊顧孩子邊看診，接到電話說他出事了在搶救中。我聯絡家人，家人趕來照顧。

他回來後狀況不穩，差點動手打我，當著我和孩子的面摔壞東西。

那時我還沒察覺兒子其實有情緒和發展上的需求。每天和兒子大小奮鬥，遇到先生在家，我就被修理。

我學習改變——學會安靜，學會察言觀色，學會避重就輕，學會不是什麼事都要說。

家裡經歷了很多變故，有人重病離世，有經濟上的恩怨糾葛。疫情期間診所幾乎無法運作，我各式申請補助、拜託廠商、拜託房東度過。

就是從結婚開始就是我一直要體諒。

第二胎事隔多年。剖腹產順便處理掉避孕問題。

生完後媽媽過來幫忙。我對孩子習慣養成非常固執，和媽媽很多衝突。即使是我的媽媽，一起衝突先生就寫長篇文來訓我，把我講得很不堪。

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function save() {
  localStorage.setItem('kb_notes', JSON.stringify(notes));
  updateCounts();
  render();
}

function updateCounts() {
  const cats = ['all','中醫氣功','醫療知識','個人成長','AI工具','靈感記錄','結構學習','留下來的人','理財','親子教養','其他'];
  cats.forEach(c => {
    const el = document.getElementById('count-' + c);
    if (el) el.textContent = c === 'all' ? notes.length : notes.filter(n => n.cat === c).length;
  });
  document.getElementById('total-count').textContent = notes.length + ' 篇筆記';
}

function getFiltered() {
  return notes.filter(n => {
    const matchCat = currentCat === 'all' || n.cat === currentCat;
    const matchQ = !searchQ || n.title.includes(searchQ) || n.content.includes(searchQ);
    return matchCat && matchQ;
  }).sort((a, b) => b.date.localeCompare(a.date));
}

function render() {
  const filtered = getFiltered();
  const container = document.getElementById('cards');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="emoji">📭</div>
        <p>這裡還沒有筆記<br>點左下角「新增筆記」開始記錄</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(n => `
    <div class="card" onclick="openDetail('${n.id}')">
      <div class="card-cat">
        <span style="width:7px;height:7px;border-radius:50%;background:${CAT_COLORS[n.cat]||'#bbb'};display:inline-block"></span>
        ${n.cat}
      </div>
      <div class="card-title">${n.title}</div>
      <div class="card-preview">${n.content}</div>
      <div class="card-date">${n.date}</div>
    </div>
  `).join('');
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.getElementById('view-title').textContent = cat === 'all' ? '全部' : cat;
  render();
}

function search(q) {
  searchQ = q;
  render();
}

// Modal helpers
function openModal() { document.getElementById('overlay').classList.add('open'); }
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}
function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = '新增筆記';
  document.getElementById('modal-body').innerHTML = formHTML({ title:'', cat: currentCat === 'all' ? '其他' : currentCat, content:'', date: new Date().toISOString().slice(0,10) });
  openModal();
}

function openDetail(id) {
  const n = notes.find(x => x.id === id);
  if (!n) return;
  document.getElementById('modal-title').textContent = '';
  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:8px">
      <span style="font-size:13px;color:${CAT_COLORS[n.cat]||'#bbb'};font-family:'DM Mono',monospace;">● ${n.cat}</span>
    </div>
    <h2 style="font-size:20px;font-weight:600;line-height:1.4;margin-bottom:16px">${n.title}</h2>
    <div class="detail-meta">
      <span>📅 ${n.date}</span>
    </div>
    <div class="detail-content">${n.content}</div>
    <div class="modal-actions">
      <button class="btn-delete" onclick="deleteNote('${id}')">刪除</button>
      <button class="btn-edit" onclick="openEdit('${id}')">編輯</button>
      <button class="btn-save" onclick="closeModal()">關閉</button>
    </div>
  `;
  openModal();
}

function openEdit(id) {
  const n = notes.find(x => x.id === id);
  if (!n) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '編輯筆記';
  document.getElementById('modal-body').innerHTML = formHTML(n);
}

function formHTML(n) {
  const cats = ['中醫氣功','醫療知識','個人成長','AI工具','靈感記錄','結構學習','留下來的人','理財','親子教養','其他'];
  return `
    <div class="form-group">
      <label>標題</label>
      <input id="f-title" type="text" value="${(n.title||'').replace(/"/g,'&quot;')}" placeholder="筆記標題">
    </div>
    <div class="form-group">
      <label>分類</label>
      <select id="f-cat">
        ${cats.map(c => `<option value="${c}" ${n.cat===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>日期</label>
      <input id="f-date" type="date" value="${n.date||new Date().toISOString().slice(0,10)}">
    </div>
    <div class="form-group">
      <label>內容</label>
      <textarea id="f-content" placeholder="記錄你的想法、靈感、整理...">${n.content||''}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveNote()">儲存</button>
    </div>
  `;
}

function saveNote() {
  const title = document.getElementById('f-title').value.trim();
  const cat = document.getElementById('f-cat').value;
  const date = document.getElementById('f-date').value;
  const content = document.getElementById('f-content').value.trim();
  if (!title) { alert('請填寫標題'); return; }

  if (editingId) {
    const idx = notes.findIndex(n => n.id === editingId);
    if (idx >= 0) notes[idx] = { ...notes[idx], title, cat, date, content };
  } else {
    notes.unshift({ id: uid(), title, cat, date, content });
  }
  closeModal();
  save();
}

function deleteNote(id) {
  if (!confirm('確定要刪除這篇筆記嗎？')) return;
  notes = notes.filter(n => n.id !== id);
  closeModal();
  save();
}

// Init
updateCounts();
render();
</script>
